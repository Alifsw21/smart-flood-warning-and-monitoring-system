services:
  mysql:
    image: mysql:8.0
    container_name: smartcity-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootSecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kelompok2}
    ports:
      - "3350:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - smartcity-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-RootSecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smartcity-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-RabbitSecret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - smartcity-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartcity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - smartcity-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartcity-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./iot/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./iot/passwd.dev:/mosquitto/config/passwd:ro
    networks:
      - smartcity-net

  iot-simulator:
    image: python:3.12-slim
    container_name: smartcity-iot-simulator
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./iot:/app
    command: ["sh", "-c", "pip install --no-cache-dir paho-mqtt && python simulator.py"]
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_PREFIX: kelompok2/sensors
      SIMULATOR_INTERVAL_SEC: 30
    depends_on:
      - mosquitto
    networks:
      - smartcity-net

  oauth-server:
    build: ./oauth-server
    container_name: smartcity-oauth
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3531
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: auth
      DB_PASSWORD: ${AUTH_DB_PASSWORD:-AuthSecret}
      DB_NAME: ${MYSQL_DATABASE:-kelompok2}
    ports:
      - "3531:3531"
    networks:
      - smartcity-net

  php-user:
    build: ./php-user
    container_name: smartcity-php-user
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      oauth-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      OAUTH_LOGIN_URL: http://oauth-server:3531/api/auth/login
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-kelompok2}
      DB_USER: user
      DB_PASSWORD: ${USER_DB_PASSWORD:-UserSecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD:-RabbitSecret}
    ports:
      - "8150:80"
    networks:
      - smartcity-net

  php-user-notification-consumer:
    build:
      context: ./php-user
      dockerfile: Dockerfile.consumer
    container_name: smartcity-php-user-notification-consumer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-kelompok2}
      DB_USER: user
      DB_PASSWORD: ${USER_DB_PASSWORD:-UserSecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD:-RabbitSecret}
    networks:
      - smartcity-net

  php-river:
    build: ./php-river
    container_name: smartcity-php-river
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-kelompok2}
      DB_USERNAME: river
      DB_PASSWORD: ${RIVER_DB_PASSWORD:-RiverSecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD:-RabbitSecret}
      APP_DEBUG: "false"
    ports:
      - "8151:80"
    networks:
      - smartcity-net

  php-analytics:
    build: ./php-analytics
    container_name: smartcity-php-analytics
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-kelompok2}
      DB_USER: analytics
      DB_PASSWORD: ${ANALYTICS_DB_PASSWORD:-AnalyticSecret}
    ports:
      - "8152:80"
    networks:
      - smartcity-net

  php-analytics-consumer:
    build:
      context: ./php-analytics
      dockerfile: Dockerfile.consumer
    container_name: smartcity-php-analytics-consumer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-kelompok2}
      DB_USER: analytics
      DB_PASSWORD: ${ANALYTICS_DB_PASSWORD:-AnalyticSecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD:-RabbitSecret}
    networks:
      - smartcity-net

  python-ml-service:
    build: ./python-ml-service
    container_name: smartcity-python-ml
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitSecret}
      RABBITMQ_VHOST: /
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC_PREFIX: kelompok2/sensors
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kelompok2}
      RIVER_DB_USER: river
      RIVER_DB_PASSWORD: ${RIVER_DB_PASSWORD:-RiverSecret}
      ANALYTICS_DB_USER: analytics
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD:-AnalyticSecret}
    ports:
      - "5010:8000"
    networks:
      - smartcity-net

  python-ml-consumer-air:
    build: ./python-ml-service
    container_name: smartcity-ml-consumer-air
    restart: unless-stopped
    command: ["python", "consumers/sensorReadingConsumer.py"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitSecret}
      RABBITMQ_VHOST: /
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kelompok2}
      RIVER_DB_USER: river
      RIVER_DB_PASSWORD: ${RIVER_DB_PASSWORD:-RiverSecret}
    networks:
      - smartcity-net

  python-ml-consumer-banjir:
    build: ./python-ml-service
    container_name: smartcity-ml-consumer-banjir
    restart: unless-stopped
    command: ["python", "consumers/banjirConsumer.py"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-smartcity}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-RabbitSecret}
      RABBITMQ_VHOST: /
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - smartcity-net

  express-gateway:
    build: ./express-gateway
    container_name: smartcity-gateway
    restart: unless-stopped
    depends_on:
      - redis
      - oauth-server
      - php-user
      - php-river
      - php-analytics
      - python-ml-service
    environment:
      PORT: 3530
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      OAUTH_URL: http://oauth-server:3531
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-gateway}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-GatewaySecretDev123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      PHP_USER_URL: http://php-user:80
      PHP_RIVER_URL: http://php-river:80
      PHP_ANALYTICS_URL: http://php-analytics:80
      ML_URL: http://python-ml-service:8000
    ports:
      - "3530:3530"
    networks:
      - smartcity-net

  node-red:
    image: nodered/node-red:3.1
    container_name: smartcity-node-red
    restart: unless-stopped
    ports:
      - "1890:1890"
    volumes:
      - ./iot/node-red-data:/data
    environment:
      PORT: 1890
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-gateway}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-GatewaySecretDev123}
      IOT_MQTT_BROKER: ${IOT_MQTT_BROKER:-mosquitto}
      IOT_MQTT_PORT: ${IOT_MQTT_PORT:-1883}
    networks:
      - smartcity-net
    depends_on:
      - mosquitto
      - oauth-server
      - express-gateway

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: smartcity-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - smartcity-net

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: smartcity-prometheus
    restart: unless-stopped
    depends_on:
      - express-gateway
      - cadvisor
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - smartcity-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: smartcity-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/smartcity-platform.json:ro
    networks:
      - smartcity-net

networks:
  smartcity-net:
    driver: bridge

volumes:
  mysql-data:
  rabbitmq-data:
  grafana-data:

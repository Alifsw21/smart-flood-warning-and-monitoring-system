# Spec §6 — RabbitMQ workers, IoT bridge, and citizen notification consumer (S1/S5/S6)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ml-consumer-air
  namespace: smartcity
  labels:
    app: python-ml-consumer-air
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ml-consumer-air
  template:
    metadata:
      labels:
        app: python-ml-consumer-air
        tier: worker
    spec:
      containers:
        - name: consumer
          image: smartcity/python-ml-service:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "consumers/sensorReadingConsumer.py"]
          envFrom:
            - configMapRef:
                name: smartcity-config
          env:
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: RABBITMQ_PASSWORD
            - name: RIVER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: RIVER_DB_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

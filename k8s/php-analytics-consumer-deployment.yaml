# Spec §4.5 / S6 — RabbitMQ anomaly.alert consumer for php-analytics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-analytics-consumer
  namespace: smartcity
  labels:
    app: php-analytics-consumer
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-analytics-consumer
  template:
    metadata:
      labels:
        app: php-analytics-consumer
        tier: worker
    spec:
      containers:
        - name: php-analytics-consumer
          image: smartcity/php-analytics-consumer:latest
          imagePullPolicy: IfNotPresent
          command: ["php", "bin/consume-alerts.php"]
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: MYSQL_DATABASE
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_USER_ANALYTICS
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: ANALYTICS_DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: RABBITMQ_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

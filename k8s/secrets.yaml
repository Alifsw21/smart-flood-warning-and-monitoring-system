# Spec §6.1 — sensitive credentials (dev defaults match .env.example; replace in production)
# kubectl stores stringData as base64 in etcd
apiVersion: v1
kind: Secret
metadata:
  name: smartcity-secrets
  namespace: smartcity
  labels:
    app.kubernetes.io/part-of: smart-flood-warning
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: RootSecret
  JWT_SECRET: dev-jwt-secret-change-me
  OAUTH_CLIENT_SECRET: GatewaySecretDev123
  AUTH_DB_PASSWORD: AuthSecret
  RIVER_DB_PASSWORD: RiverSecret
  USER_DB_PASSWORD: UserSecret
  ANALYTICS_DB_PASSWORD: AnalyticSecret
  RABBITMQ_PASSWORD: RabbitSecret

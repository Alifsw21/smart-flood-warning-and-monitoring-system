name: IoT Tests

on:
  push:
    branches: [main]
    paths:
      - 'iot/**'
      - '.github/workflows/iot-tests.yml'
  pull_request:
    paths:
      - 'iot/**'
      - '.github/workflows/iot-tests.yml'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Run IoT test suite (unit only)
        run: bash iot/tests/run.sh

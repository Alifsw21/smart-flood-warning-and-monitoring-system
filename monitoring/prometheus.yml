# Spec §5 docker-compose + §3.2: Prometheus scrapes service metrics for Grafana dashboards.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: express-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["express-gateway:3530"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

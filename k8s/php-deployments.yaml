# Spec §6.1 — three PHP MVC services (Citizen/Traffic/Environment → php-user/php-river/php-analytics)
---
apiVersion: v1
kind: Service
metadata:
  name: php-user-svc
  namespace: smartcity
  labels:
    app: php-user
    tier: service
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: php-user
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-user
  namespace: smartcity
  labels:
    app: php-user
    tier: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php-user
  template:
    metadata:
      labels:
        app: php-user
        tier: service
    spec:
      containers:
        - name: php-user
          image: smartcity/php-user:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: OAUTH_LOGIN_URL
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: OAUTH_LOGIN_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: MYSQL_DATABASE
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: DB_USER_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: USER_DB_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  name: smartcity-config
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: smartcity-secrets
                  key: RABBITMQ_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
